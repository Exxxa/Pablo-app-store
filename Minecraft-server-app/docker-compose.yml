version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: Minecraft-server-app_ui_1
      APP_PORT: 25566

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: Minecraft-server-app_minecraft_1
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: VANILLA
    ports:
      - "25565:25565"
    volumes:
      - ${APP_DATA_DIR}/minecraft:/data

  ui:
    build: ./ui
    container_name: Minecraft-server-app_ui_1
    restart: unless-stopped
    environment:
      MINECRAFT_CONTAINER: Minecraft-server-app_minecraft_1
      DATA_DIR: /minecraft-data
      PORT: 25566
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APP_DATA_DIR}/minecraft:/minecraft-data
    depends_on:
      - minecraft
