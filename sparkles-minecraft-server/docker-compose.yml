version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: sparkles-minecraft-server_ui_1
      APP_PORT: 25566

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: sparkles-minecraft-server_minecraft_1
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: VANILLA
    ports:
      - "25565:25565"
    volumes:
      - ${APP_DATA_DIR}/minecraft:/data

  ui:
    image: exxxa/sparkles-minecraft-server-ui:latest
    container_name: sparkles-minecraft-server_ui_1
    restart: unless-stopped
    environment:
      MINECRAFT_CONTAINER: sparkles-minecraft-server_minecraft_1
      DATA_DIR: /minecraft-data
      PORT: 25566
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APP_DATA_DIR}/minecraft:/minecraft-data
    depends_on:
      - minecraft
