version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: sparkles-minecraft-server_ui_1
      APP_PORT: 25566

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: sparkles-minecraft-server_minecraft_1
    restart: unless-stopped
    # Give Minecraft time to save the world on host reboot / Docker shutdown
    # (itzg forwards SIGTERM -> save + stop). Without this, Docker SIGKILLs at ~10s.
    stop_grace_period: 120s
    environment:
      EULA: "TRUE"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "sparkles_mc_rcon"
    # Game config (VERSION / TYPE / MEMORY / mods / ...) is written by the UI to
    # mc.env so the user's chosen version survives reboots and the server never
    # boots on LATEST (which would irreversibly upgrade the world). These keys are
    # intentionally NOT in `environment:` above, because environment overrides
    # env_file. required:false keeps first boot working before mc.env exists.
    env_file:
      - path: ${APP_DATA_DIR}/minecraft/mc.env
        required: false
    ports:
      - "25565:25565"
    volumes:
      - ${APP_DATA_DIR}/minecraft:/data

  ui:
    image: exxxa/sparkles-minecraft-server-ui:latest
    container_name: sparkles-minecraft-server_ui_1
    restart: unless-stopped
    environment:
      MINECRAFT_CONTAINER: sparkles-minecraft-server_minecraft_1
      DATA_DIR: /minecraft-data
      PORT: 25566
      RCON_PASSWORD: "sparkles_mc_rcon"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APP_DATA_DIR}/minecraft:/minecraft-data
    depends_on:
      - minecraft
